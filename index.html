
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Outcome Tracker</title>
    <style>
        /* — Existing CSS — (Keep all previous styles unchanged) — */
        /* Add this new CSS for the modals */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: #fff; border-radius: 12px; padding: 30px; width: 420px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal h2 { margin-bottom: 16px; color: #1a237e; }
        .modal label { display: block; margin: 10px 0 5px; font-weight: 600; }
        .modal input, .modal select { width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    </style>
</head>
<body>
    <!-- Header & Filter Bar (Keep existing content) -->

    <!-- **NEW: Add Task Modal ** -->
    <div class="modal-overlay" id="addTaskModal">
        <div class="modal">
            <h2>📝 Add New Task</h2>
            <form id="addTaskForm">
                <label>Task ID:</label>
                <input type="text" id="newTaskId" required>
                
                <label>CID:</label>
                <input type="text" id="newCid" required>
                
                <label>Task Type:</label>
                <select id="newTaskType" required>
                    <option value="BAV">BAV</option>
                    <option value="BIV">BIV</option>
                    <option value="BOV">BOV</option>
                    <option value="LOA">LOA</option>
                    <option value="LRV">LRV</option>
                    <option value="IDV">IDV</option>
                </select>
                
                <label>Outcome:</label>
                <select id="newOutcome" required onchange="validateCount()">
                    <option value="RFD">RFD</option>
                    <option value="Verify">Verify</option>
                    <option value="RFI">RFI</option>
                    <option value="Escalate">Escalate</option>
                    <option value="Transfer">Transfer</option>
                    <option value="Snooze">Snooze</option>
                </select>
                
                <label>Count:</label>
                <input type="number" id="newCount" min="1" required>
                <div id="countError" style="color:red; display:none;">Invalid count for selected outcome.</div>
            </form>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeAddModal()">Cancel</button>
                <button class="btn btn-success" onclick="saveNewTask()">Save</button>
            </div>
        </div>
    </div>

    <!-- Keep existing table, modals, and toast -->

    <script>
        // ── Existing Data Model & Functions ── (Keep all previous JS)

        // **NEW: Open Add Task Modal**
        function addNewRow() {
            document.getElementById('addTaskModal').classList.add('active');
        }

        // **NEW: Close Add Task Modal**
        function closeAddModal() {
            document.getElementById('addTaskModal').classList.remove('active');
            document.getElementById('countError').style.display = 'none';
        }

        // **NEW: Validate Count Based on Outcome**
        function validateCount() {
            const outcome = document.getElementById('newOutcome').value;
            const count = parseInt(document.getElementById('newCount').value);
            const requiredCount = OUTCOME_COUNT[outcome];
            const errorDiv = document.getElementById('countError');
            
            if (requiredCount && count !== requiredCount) {
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
            }
        }

        // **NEW: Save New Task from Modal**
        function saveNewTask() {
            if (document.getElementById('countError').style.display === 'block') {
                showToast('Please fix the count error!');
                return;
            }

            const newTask = {
                taskId: document.getElementById('newTaskId').value,
                cid: document.getElementById('newCid').value,
                taskType: document.getElementById('newTaskType').value,
                outcome: document.getElementById('newOutcome').value,
                count: parseInt(document.getElementById('newCount').value)
            };

            tasks.push(newTask);
            saveTasks();
            renderTable();
            updateSummaryCards();
            closeAddModal();
            showToast('New task added!');
        }

        // ── Keep existing functions (saveTasks, renderTable, etc.) ──
    </script>
</body>
</html>
